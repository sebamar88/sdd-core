name: Publish npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    env:
      NPM_PUBLISH_TOKEN: ${{ secrets.NPM_REPOSITORY_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Run release readiness checks
        run: python scripts/release_check.py

      - name: Validate npm token
        run: |
          if [ -z "${NPM_PUBLISH_TOKEN}" ]; then
            echo "::error::NPM_REPOSITORY_TOKEN is not available to this workflow. Verify the repository secret exists and that this workflow can access it."
            exit 1
          fi
        env:
          NPM_PUBLISH_TOKEN: ${{ env.NPM_PUBLISH_TOKEN }}

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_PUBLISH_TOKEN }}
